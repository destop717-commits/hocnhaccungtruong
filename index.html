<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Master PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root {
--primary: #0f172a; --accent: #fbbf24; --secondary: #6366f1;
--bg: #f8fafc; --card: #ffffff; --text: #1e293b;
}

body { font-family: 'Inter'; margin:0; background:var(--bg); text-align:center; }

header { background:#0f172a; color:white; padding:20px; }

nav button {
margin:5px; padding:10px; font-weight:bold; cursor:pointer;
}

.piano { display:flex; position:relative; width:840px; margin:auto; }

.white-key {
width:70px; height:240px; background:white;
display:flex; align-items:flex-end; justify-content:center;
}

.black-key {
width:46px; height:140px; background:black;
position:absolute; margin-left:-23px;
color:white;
}

#noteDisplay { font-size:22px; margin:10px; }

button { border:none; border-radius:8px; padding:10px; }
</style>
</head>

<body>

<header>
<h1>🎹 Music Master PRO</h1>
<p>Học piano + AI</p>
</header>

<div id="noteDisplay">Chưa bấm nốt</div>

<button onclick="startEarTest()">🎧 Nghe nốt</button>
<button onclick="showTheory()">📘 Lý thuyết</button>
<button onclick="testMove()">🎯 Test ngón</button>
<button onclick="detectChord()">🎹 Hợp âm</button>

<p>Điểm: <span id="score">0</span></p>

<div class="piano">
<div class="white-key key" data-note="C" data-freq="261">C</div>
<div class="black-key key" style="left:70px" data-note="C#" data-freq="277"></div>
<div class="white-key key" data-note="D" data-freq="293">D</div>
<div class="black-key key" style="left:140px" data-note="D#" data-freq="311"></div>
<div class="white-key key" data-note="E" data-freq="329">E</div>
<div class="white-key key" data-note="F" data-freq="349">F</div>
<div class="black-key key" style="left:280px" data-note="F#" data-freq="369"></div>
<div class="white-key key" data-note="G" data-freq="392">G</div>
<div class="black-key key" style="left:350px" data-note="G#" data-freq="415"></div>
<div class="white-key key" data-note="A" data-freq="440">A</div>
<div class="black-key key" style="left:420px" data-note="A#" data-freq="466"></div>
<div class="white-key key" data-note="B" data-freq="493">B</div>
<div class="white-key key" data-note="C5" data-freq="523">C5</div>
</div>

<script>
// AUDIO
const ctx = new (window.AudioContext || window.webkitAudioContext)();
let target = null;
let score = 0;
let pressed = [];

function play(freq){
ctx.resume();
let o = ctx.createOscillator();
let g = ctx.createGain();
o.frequency.value = freq;
o.connect(g);
g.connect(ctx.destination);
o.start();
o.stop(ctx.currentTime + 1);
}

// GAME NGHE NỐT
function startEarTest(){
const keys = document.querySelectorAll('.key');
const rand = keys[Math.floor(Math.random()*keys.length)];
target = rand.dataset.note;
play(rand.dataset.freq);
}

// CLICK KEY
document.querySelectorAll('.key').forEach(k=>{
k.addEventListener("click",()=>{
let note = k.dataset.note;
play(k.dataset.freq);

document.getElementById("noteDisplay").innerText="Bạn bấm: "+note;

// game
if(target){
if(note === target){
score++;
document.getElementById("score").innerText=score;
alert("Đúng!");
}else{
alert("Sai! Đáp án: "+target);
}
target=null;
}

// chord tracking
pressed.push(note);
});

// mobile
k.addEventListener("touchstart",()=>{
play(k.dataset.freq);
});
});

// AI
class PianoLearningAssistant{
constructor(){
this.notes=['Do','Re','Mi','Fa','Sol','La','Si'];
this.line_notes=['Mi','Sol','Si','Re','Fa'];
this.space_notes=['Fa','La','Do','Mi'];
}

learnTheory(){
return "Dòng: "+this.line_notes.join(", ")+"\nKhe: "+this.space_notes.join(", ");
}

moveFinger(a,b){
let s=this.notes.indexOf(a);
let e=this.notes.indexOf(b);
if(s==-1||e==-1) return "Sai nốt";
let d=e-s;
return d>0? "Lên "+d : "Xuống "+Math.abs(d);
}
}

const ai = new PianoLearningAssistant();

function showTheory(){
alert(ai.learnTheory());
}

function testMove(){
let a=prompt("Nốt (Do Re Mi...)");
let b=prompt("Nốt tiếp");
alert(ai.moveFinger(a,b));
}

// CHORD
function detectChord(){
if(pressed.includes("C") && pressed.includes("E") && pressed.includes("G")){
alert("🎹 Hợp âm C Major");
}else{
alert("❌ Không nhận diện được");
}
pressed=[];
}
</script>

</body>
</html>
